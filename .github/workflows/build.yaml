name: Build CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
      - name: Build the container images
        run: |
          TAGS="$(ls build)"
          for tag in $TAGS; do 
            echo -n "Building '${tag}'... "
            bash build.sh "${tag}"
            echo "Done!"
          done
